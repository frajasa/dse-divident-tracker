services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dse_dividends
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5456:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/dse_dividends
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      API_PROXY_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
